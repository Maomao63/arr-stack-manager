<div class="max-w-xl mx-auto bg-gray-800 p-6 rounded-lg shadow-lg">
    <h2 class="text-xl mb-4 font-bold text-blue-400">Einstellungen</h2>
    <form action="/save-config" method="post" class="space-y-4">
        <div>
            <label class="block text-sm text-gray-400">Sonarr URL</label>
            <input type="text" name="sonarr_a_url" value="{{ config.sonarr_a_url }}" class="w-full bg-gray-900 border border-gray-700 p-2 rounded">
        </div>
        <div>
            <label class="block text-sm text-gray-400">Sonarr API Key</label>
            <input type="password" name="sonarr_a_api" value="{{ config.sonarr_a_api }}" class="w-full bg-gray-900 border border-gray-700 p-2 rounded">
        </div>
        <hr class="border-gray-700">
        <div>
            <label class="block text-sm text-gray-400">Radarr URL</label>
            <input type="text" name="radarr_a_url" value="{{ config.radarr_a_url }}" class="w-full bg-gray-900 border border-gray-700 p-2 rounded">
        </div>
        <div>
            <label class="block text-sm text-gray-400">Radarr API Key</label>
            <input type="password" name="radarr_a_api" value="{{ config.radarr_a_api }}" class="w-full bg-gray-900 border border-gray-700 p-2 rounded">
        </div>
        <button type="submit" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-white font-bold w-full">Speichern</button>
    </form>
</div>
