<!DOCTYPE html>
<html class="dark">
<head>
    <meta charset="UTF-8">
    <title>Arr-Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-[#0f172a] to-black antialiased">
    <nav class="border-b border-white/5 bg-[#0f172a]/80 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <span class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">Arr-Sync</span>
            <div class="flex space-x-2 bg-slate-800/50 p-1.5 rounded-2xl border border-white/5">
                <button hx-get="/sonarr-data" hx-target="#content" class="px-6 py-2.5 font-semibold hover:text-white hover:bg-blue-500/20 rounded-xl transition-all">Sonarr</button>
                <button hx-get="/radarr-data" hx-target="#content" class="px-6 py-2.5 font-semibold hover:text-white hover:bg-yellow-500/20 rounded-xl transition-all">Radarr</button>
                <button hx-get="/history" hx-target="#content" class="px-6 py-2.5 font-semibold hover:text-white hover:bg-emerald-500/20 rounded-xl transition-all">Verlauf</button>
                <button hx-get="/settings" hx-target="#content" class="px-6 py-2.5 font-semibold hover:text-white hover:bg-white/10 rounded-xl transition-all">Einstellungen</button>
            </div>
        </div>
    </nav>
    <main id="content" class="p-8 max-w-7xl mx-auto mt-8">
        <div class="text-center mt-32 space-y-4">
            <h2 class="text-5xl font-extrabold tracking-tight">Willkommen</h2>
            <p class="text-slate-400 text-xl">Wähle oben Sonarr oder Radarr, um Duplikate zwischen deinen Instanzen zu finden.</p>
        </div>
    </main>
</body>
</html>
