<div class="max-w-4xl mx-auto space-y-6">
    <div class="flex justify-between items-end mb-8 border-b border-white/5 pb-4">
        <h2 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-500">Activity History</h2>
        <span class="text-slate-400 font-medium">The last 100 deletions</span>
    </div>

    {% if history %}
    <div class="space-y-3">
        {% for log in history %}
        <div class="flex items-center justify-between bg-slate-800/40 p-4 rounded-xl border border-white/5 shadow-sm">
            <div class="flex items-center gap-4">
                {% if log.app == "Sonarr" %}
                    <span class="bg-blue-500/20 text-blue-400 text-xs font-bold px-3 py-1 rounded-md border border-blue-500/20">Sonarr</span>
                {% else %}
                    <span class="bg-yellow-500/20 text-yellow-400 text-xs font-bold px-3 py-1 rounded-md border border-yellow-500/20">Radarr</span>
                {% endif %}
                <span class="text-white font-semibold">{{ log.title }}</span>
            </div>
            <div class="text-slate-500 text-sm">
                {{ log.time }}
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="text-center py-20 bg-slate-800/20 rounded-3xl border border-white/5">
        <span class="text-xl text-slate-500 font-medium">No history entries yet.</span>
    </div>
    {% endif %}
</div>
