<div class="space-y-6">
    <div class="flex justify-between items-end mb-8 border-b border-white/5 pb-4">
        <h2 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-600">Sonarr Duplikate</h2>
        <span class="bg-blue-500/10 text-blue-400 border border-blue-500/20 px-5 py-2 rounded-full font-bold shadow-[0_0_15px_rgba(59,130,246,0.2)]">{{ duplicates|length }} Gefunden</span>
    </div>
    
    {% if duplicates %}
    <div class="grid grid-cols-1 gap-4">
        {% for item in duplicates %}
        <div id="sonarr-{{ item.id }}" class="flex justify-between items-center bg-slate-800/40 hover:bg-slate-800/60 p-6 rounded-2xl border border-white/5 transition-all">
            <div>
                <h3 class="text-xl font-bold text-white">{{ item.title }}</h3>
                <p class="text-sm font-medium {% if item.complete %}text-green-400{% else %}text-orange-400{% endif %} mt-1">{{ item.status }}</p>
            </div>
            <button hx-delete="/delete/sonarr/{{ item.id }}?title={{ item.safe_title }}" hx-target="#sonarr-{{ item.id }}" hx-swap="outerHTML" class="bg-red-500/10 hover:bg-red-500 hover:text-white text-red-500 border border-red-500/20 px-6 py-2.5 rounded-xl font-bold transition-all shadow-lg">Löschen (Instanz A)</button>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="text-center py-20 bg-slate-800/20 rounded-3xl border border-white/5">
        <span class="text-2xl text-slate-500 font-bold">Alles sauber! Keine Duplikate mit Episoden gefunden.</span>
    </div>
    {% endif %}
</div>
