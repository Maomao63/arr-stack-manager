services:
  arr-stack-manager:
    image: ghcr.io/maomao63/arr-stack-manager:latest
    pull_policy: always
    container_name: arr-stack-manager
    restart: unless-stopped
    ports:
      - "5005:8000"
    volumes:
      - "${CONFIG_PATH:-./config}:/config"
    environment:
      TZ: "${TZ:-Europe/Berlin}"
